<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="vesselGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fecaca"/>
      <stop offset="50%" style="stop-color:#fecaca"/>
      <stop offset="50%" style="stop-color:#fee2e2"/>
      <stop offset="100%" style="stop-color:#fee2e2"/>
    </linearGradient>
    <linearGradient id="bloodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#991b1b"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
    <linearGradient id="plateletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="fibrinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    
    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f8fafc">Thrombus Formation Process</text>
  <text x="450" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">The Pathophysiology of Blood Clot Formation</text>

  <!-- Stage 1: Vascular Injury -->
  <g transform="translate(50, 110)">
    <!-- Card background -->
    <rect x="0" y="0" width="250" height="260" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="250" height="40" rx="12" fill="#dc2626"/>
    <rect x="0" y="20" width="250" height="20" fill="#dc2626"/>
    <text x="125" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Stage 1: Vascular Injury</text>
    
    <!-- Blood vessel cross-section -->
    <g transform="translate(25, 55)">
      <!-- Outer vessel wall -->
      <ellipse cx="100" cy="90" rx="95" ry="85" fill="url(#vesselGrad)" stroke="#e5e7eb" stroke-width="2"/>
      
      <!-- Inner lumen (blood) -->
      <ellipse cx="100" cy="92" rx="75" ry="65" fill="url(#bloodGrad)"/>
      
      <!-- Red blood cells (RBCs) -->
      <g fill="#ef4444" opacity="0.8">
        <circle cx="70" cy="80" r="10"/>
        <circle cx="100" cy="70" r="10"/>
        <circle cx="130" cy="85" r="10"/>
        <circle cx="80" cy="105" r="10"/>
        <circle cx="115" cy="108" r="10"/>
        <circle cx="95" cy="120" r="10"/>
        <circle cx="60" cy="95" r="8"/>
        <circle cx="140" cy="100" r="8"/>
      </g>
      
      <!-- Injury site - damaged endothelium -->
      <path d="M55,130 Q100,155 145,128" fill="none" stroke="#7f1d1d" stroke-width="8" stroke-linecap="round"/>
      <path d="M58,132 Q100,156 142,130" fill="none" stroke="#450a0a" stroke-width="4" stroke-linecap="round"/>
      
      <!-- Injury indicator arrows -->
      <polygon points="100,165 93,150 107,150" fill="#fbbf24" filter="url(#glow)"/>
      <line x1="100" y1="165" x2="100" y2="180" stroke="#fbbf24" stroke-width="2"/>
      
      <!-- Collagen exposure label -->
      <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fca5a5">Collagen Exposed</text>
    </g>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(305, 230)">
    <path d="M0,0 L35,0" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>
    <polygon points="40,0 30,-6 30,6" fill="#64748b"/>
  </g>

  <!-- Stage 2: Platelet Adhesion & Activation -->
  <g transform="translate(360, 110)">
    <rect x="0" y="0" width="250" height="260" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="250" height="40" rx="12" fill="#2563eb"/>
    <rect x="0" y="20" width="250" height="20" fill="#2563eb"/>
    <text x="125" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Stage 2: Platelet Adhesion</text>
    
    <g transform="translate(25, 55)">
      <!-- Blood vessel -->
      <ellipse cx="100" cy="90" rx="95" ry="85" fill="url(#vesselGrad)" stroke="#e5e7eb" stroke-width="2"/>
      <ellipse cx="100" cy="92" rx="75" ry="65" fill="url(#bloodGrad)"/>
      
      <!-- RBCs -->
      <g fill="#ef4444" opacity="0.8">
        <circle cx="70" cy="75" r="10"/>
        <circle cx="130" cy="78" r="10"/>
        <circle cx="85" cy="115" r="10"/>
        <circle cx="120" cy="118" r="10"/>
        <circle cx="60" cy="98" r="8"/>
        <circle cx="140" cy="102" r="8"/>
      </g>
      
      <!-- Injury site with platelets adhering -->
      <path d="M55,130 Q100,158 145,128" fill="none" stroke="#7f1d1d" stroke-width="8" stroke-linecap="round"/>
      
      <!-- Adhering platelets (activated - irregular shape) -->
      <g fill="url(#plateletGrad)" filter="url(#glow)">
        <ellipse cx="70" cy="138" rx="12" ry="8" transform="rotate(-15 70 138)"/>
        <ellipse cx="88" cy="145" rx="11" ry="7" transform="rotate(5 88 145)"/>
        <ellipse cx="105" cy="148" rx="12" ry="8" transform="rotate(10 105 148)"/>
        <ellipse cx="122" cy="143" rx="11" ry="7" transform="rotate(-5 122 143)"/>
        <ellipse cx="135" cy="136" rx="10" ry="7" transform="rotate(-20 135 136)"/>
      </g>
      
      <!-- Pseudopods (activation markers) -->
      <g stroke="#93c5fd" stroke-width="1.5" fill="none">
        <path d="M62,134 Q55,128 52,132"/>
        <path d="M78,142 Q85,148 88,145"/>
        <path d="M112,152 Q118,158 120,153"/>
        <path d="M132,140 Q140,135 142,138"/>
      </g>
      
      <!-- vWF label -->
      <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#93c5fd">vWF mediates adhesion</text>
      <text x="100" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#bfdbfe">Platelets activated → shape change</text>
    </g>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(615, 230)">
    <path d="M0,0 L35,0" stroke="#64748b" stroke-width="3"/>
    <polygon points="40,0 30,-6 30,6" fill="#64748b"/>
  </g>

  <!-- Stage 3: Platelet Aggregation -->
  <g transform="translate(670, 110)">
    <rect x="0" y="0" width="210" height="260" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="210" height="40" rx="12" fill="#7c3aed"/>
    <rect x="0" y="20" width="210" height="20" fill="#7c3aed"/>
    <text x="105" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Stage 3: Aggregation</text>
    
    <g transform="translate(15, 55)">
      <!-- Blood vessel -->
      <ellipse cx="90" cy="90" rx="85" ry="80" fill="url(#vesselGrad)" stroke="#e5e7eb" stroke-width="2"/>
      <ellipse cx="90" cy="92" rx="68" ry="62" fill="url(#bloodGrad)"/>
      
      <!-- RBCs (fewer now) -->
      <g fill="#ef4444" opacity="0.8">
        <circle cx="60" cy="72" r="9"/>
        <circle cx="115" cy="75" r="9"/>
        <circle cx="70" cy="112" r="8"/>
        <circle cx="110" cy="115" r="8"/>
      </g>
      
      <!-- Injury site -->
      <path d="M45,128 Q90,158 135,126" fill="none" stroke="#7f1d1d" stroke-width="8" stroke-linecap="round"/>
      
      <!-- Aggregated platelet mass (larger cluster) -->
      <ellipse cx="90" cy="142" rx="42" ry="18" fill="#3b82f6" opacity="0.9" filter="url(#glow)"/>
      
      <!-- Individual aggregated platelets -->
      <g fill="#60a5fa">
        <ellipse cx="55" cy="138" rx="10" ry="7"/>
        <ellipse cx="70" cy="145" rx="11" ry="8"/>
        <ellipse cx="88" cy="150" rx="12" ry="8"/>
        <ellipse cx="108" cy="147" rx="11" ry="8"/>
        <ellipse cx="123" cy="140" rx="10" ry="7"/>
        <ellipse cx="78" cy="137" rx="9" ry="6"/>
        <ellipse cx="100" cy="138" rx="10" ry="7"/>
        <ellipse cx="65" cy="148" rx="8" ry="6"/>
        <ellipse cx="113" cy="150" rx="8" ry="6"/>
      </g>
      
      <!-- ADP/Thromboxane A2 indicators -->
      <g fill="#f472b6" font-family="Arial, sans-serif" font-size="7">
        <text x="55" y="125">ADP</text>
        <text x="110" y="125">TXA₂</text>
      </g>
      
      <text x="90" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c4b5fd">GP IIb/IIIa receptors bind fibrinogen</text>
      <text x="90" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ddd6fe">Platelet plug forms</text>
    </g>
  </g>

  <!-- Arrow down to Stage 4 -->
  <g transform="translate(775, 375)">
    <path d="M0,0 L0,35" stroke="#64748b" stroke-width="3"/>
    <polygon points="0,40 -6,30 6,30" fill="#64748b"/>
  </g>

  <!-- Stage 4: Coagulation Cascade & Fibrin Formation -->
  <g transform="translate(500, 400)">
    <rect x="0" y="0" width="380" height="270" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="380" height="40" rx="12" fill="#ea580c"/>
    <rect x="0" y="20" width="380" height="20" fill="#ea580c"/>
    <text x="190" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Stage 4: Coagulation Cascade &amp; Fibrin Mesh</text>
    
    <g transform="translate(20, 50)">
      <!-- Blood vessel -->
      <ellipse cx="170" cy="100" rx="160" ry="95" fill="url(#vesselGrad)" stroke="#e5e7eb" stroke-width="2"/>
      <ellipse cx="170" cy="103" rx="135" ry="78" fill="url(#bloodGrad)"/>
      
      <!-- RBCs trapped -->
      <g fill="#dc2626" opacity="0.9">
        <circle cx="100" cy="85" r="11"/>
        <circle cx="200" cy="82" r="11"/>
        <circle cx="150" cy="120" r="12"/>
        <circle cx="120" cy="130" r="10"/>
        <circle cx="185" cy="128" r="10"/>
        <circle cx="170" cy="90" r="10"/>
        <circle cx="135" cy="95" r="9"/>
      </g>
      
      <!-- Fibrin mesh network -->
      <g stroke="url(#fibrinGrad)" stroke-width="2.5" fill="none" opacity="0.9" filter="url(#glow)">
        <!-- Horizontal strands -->
        <path d="M60,100 Q100,95 140,105 Q180,115 220,100 Q260,85 290,95"/>
        <path d="M55,115 Q95,125 135,118 Q175,110 215,120 Q255,130 285,118"/>
        <path d="M65,135 Q105,128 145,138 Q185,148 225,135 Q265,122 290,130"/>
        
        <!-- Vertical/diagonal connections -->
        <path d="M80,95 Q90,115 85,135"/>
        <path d="M130,100 Q140,120 135,140"/>
        <path d="M180,108 Q190,128 185,148"/>
        <path d="M230,105 Q240,125 235,142"/>
        
        <!-- Cross-links -->
        <path d="M100,108 L130,118"/>
        <path d="M150,112 L180,115"/>
        <path d="M200,110 L225,120"/>
        <path d="M120,128 L150,125"/>
        <path d="M170,130 L205,128"/>
      </g>
      
      <!-- Thrombin and Factor labels -->
      <g font-family="Arial, sans-serif" font-size="8">
        <text x="70" y="75" fill="#fcd34d">Thrombin</text>
        <text x="240" y="75" fill="#fcd34d">Fibrinogen → Fibrin</text>
        <text x="140" y="168" fill="#fb923c">Factor XIII cross-links fibrin</text>
      </g>
      
      <!-- Stable clot indicator -->
      <rect x="120" y="178" width="100" height="22" rx="11" fill="#16a34a" opacity="0.8"/>
      <text x="170" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">STABLE CLOT</text>
    </g>
  </g>

  <!-- Legend / Key Information Panel -->
  <g transform="translate(25, 395)">
    <rect x="0" y="0" width="460" height="275" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="460" height="38" rx="12" fill="#059669"/>
    <rect x="0" y="18" width="460" height="20" fill="#059669"/>
    <text x="230" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Key Components &amp; Mediators</text>
    
    <!-- Component legend -->
    <g transform="translate(20, 52)" font-family="Arial, sans-serif">
      <!-- Row 1 -->
      <circle cx="15" cy="12" r="10" fill="#ef4444"/>
      <text x="35" y="17" font-size="11" fill="#e2e8f0">Red Blood Cells (Erythrocytes)</text>
      
      <ellipse cx="245" cy="12" rx="12" ry="8" fill="#3b82f6"/>
      <text x="265" y="17" font-size="11" fill="#e2e8f0">Platelets (Thrombocytes)</text>
      
      <!-- Row 2 -->
      <line x1="5" y1="42" x2="25" y2="42" stroke="#f59e0b" stroke-width="3"/>
      <text x="35" y="47" font-size="11" fill="#e2e8f0">Fibrin Strands</text>
      
      <rect x="233" y="34" width="24" height="16" rx="3" fill="#fecaca" stroke="#e5e7eb"/>
      <text x="265" y="47" font-size="11" fill="#e2e8f0">Vessel Wall / Endothelium</text>
      
      <!-- Row 3 -->
      <path d="M5,72 Q15,67 25,72" fill="none" stroke="#7f1d1d" stroke-width="5" stroke-linecap="round"/>
      <text x="35" y="77" font-size="11" fill="#e2e8f0">Injury Site / Subendothelium</text>
      
      <circle cx="245" cy="72" r="8" fill="#991b1b"/>
      <text x="265" y="77" font-size="11" fill="#e2e8f0">Blood Plasma</text>
    </g>
    
    <!-- Important mediators section -->
    <g transform="translate(20, 145)" font-family="Arial, sans-serif">
      <text x="0" y="0" font-size="12" font-weight="bold" fill="#94a3b8">Critical Mediators:</text>
      
      <g transform="translate(0, 15)" font-size="10" fill="#cbd5e1">
        <text x="0" y="0">• <tspan fill="#60a5fa" font-weight="bold">von Willebrand Factor (vWF)</tspan> — Platelet adhesion to collagen</text>
        <text x="0" y="18">• <tspan fill="#f472b6" font-weight="bold">ADP &amp; Thromboxane A₂</tspan> — Platelet activation &amp; recruitment</text>
        <text x="0" y="36">• <tspan fill="#a78bfa" font-weight="bold">Thrombin (Factor IIa)</tspan> — Converts fibrinogen to fibrin</text>
        <text x="0" y="54">• <tspan fill="#fbbf24" font-weight="bold">Fibrin</tspan> — Forms mesh that stabilizes the clot</text>
        <text x="0" y="72">• <tspan fill="#34d399" font-weight="bold">Factor XIII</tspan> — Cross-links fibrin for stability</text>
        <text x="0" y="90">• <tspan fill="#fb923c" font-weight="bold">Tissue Factor (TF)</tspan> — Initiates extrinsic pathway</text>
      </g>
    </g>
    
    <!-- Clinical note -->
    <g transform="translate(20, 258)">
      <rect x="0" y="-12" width="420" height="20" rx="4" fill="#334155" opacity="0.5"/>
      <text x="210" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" font-style="italic">
        ⚕ Normal hemostasis prevents bleeding; pathological thrombosis can cause DVT, PE, MI, or stroke
      </text>
    </g>
  </g>

  <!-- Flow arrows between stages (bottom) -->
  <g transform="translate(480, 385)">
    <path d="M0,0 L15,15" stroke="#64748b" stroke-width="2"/>
  </g>

  <!-- Footer -->
  <text x="450" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">
    Thrombosis: Endothelial injury → Platelet adhesion → Aggregation → Coagulation cascade → Stable fibrin-platelet clot
  </text>
</svg>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrombus Formation Process</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 1250px;
            width: 100%;
        }
        h1 {
            color: #f8fafc;
            text-align: center;
            margin: 0 0 20px 0;
            font-size: 28px;
            letter-spacing: 1px;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
        .stage-group { cursor: pointer; }
        .stage-bg { transition: fill 0.3s ease; }
        .stage-group:hover .stage-bg { fill: #334155; }
        .flow-arrow { animation: pulseArrow 2s infinite alternate; }
        @keyframes pulseArrow { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .platelet { transition: transform 0.3s ease; transform-origin: center; }
        .stage-group:hover .platelet { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Thrombus Formation Process</h1>
        <svg viewBox="0 0 1200 550" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Gradients -->
                <linearGradient id="vesselGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#64748b"/>
                    <stop offset="100%" stop-color="#475569"/>
                </linearGradient>
                <linearGradient id="lumenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.8"/>
                    <stop offset="100%" stop-color="#64748b" stop-opacity="0.9"/>
                </linearGradient>
                <linearGradient id="plateletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fef08a"/>
                    <stop offset="100%" stop-color="#fde047"/>
                </linearGradient>
                <linearGradient id="rbcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ef4444"/>
                    <stop offset="100%" stop-color="#b91c1c"/>
                </linearGradient>
                <linearGradient id="fibrinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#e2e8f0"/>
                    <stop offset="100%" stop-color="#cbd5e1"/>
                </linearGradient>

                <!-- Reusable Elements -->
                <g id="platelet">
                    <circle cx="0" cy="0" r="6" fill="url(#plateletGrad)" stroke="#ca8a04" stroke-width="1"/>
                    <path d="M-4,-3 Q0,-6 4,-3 Q7,0 4,3 Q0,6 -4,3 Q-7,0 -4,-3 Z" fill="none" stroke="#ca8a04" stroke-width="0.8" opacity="0.7"/>
                </g>
                <g id="rbc">
                    <ellipse cx="0" cy="0" rx="7" ry="5" fill="url(#rbcGrad)" opacity="0.9"/>
                    <ellipse cx="0" cy="0" rx="3.5" ry="2.5" fill="#fca5a5" opacity="0.6"/>
                </g>
                <g id="collagen">
                    <path d="M0,0 Q5,-8 10,0 T20,0" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M-2,4 Q5,-4 12,4" fill="none" stroke="#b45309" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M2,-4 Q5,4 8,-4" fill="none" stroke="#92400e" stroke-width="1" stroke-linecap="round"/>
                </g>
                <g id="fibrin">
                    <path d="M0,0 Q8,-6 16,0 T32,0" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
                    <path d="M0,6 Q10,0 20,6 T40,6" fill="none" stroke="#cbd5e1" stroke-width="1"/>
                    <path d="M4,-4 Q12,2 20,-4" fill="none" stroke="#e2e8f0" stroke-width="0.8"/>
                </g>
            </defs>

            <!-- Stage 1 -->
            <g class="stage-group" transform="translate(50, 0)">
                <rect class="stage-bg" x="0" y="0" width="200" height="500" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
                <text x="100" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">1. Endothelial Injury</text>
                
                <!-- Vessel -->
                <rect x="10" y="60" width="180" height="380" rx="8" fill="url(#lumenGrad)" stroke="url(#vesselGrad)" stroke-width="4"/>
                <path d="M10,100 L190,100 M10,400 L190,400" stroke="url(#vesselGrad)" stroke-width="3" stroke-dasharray="8,4"/>
                
                <!-- Injury -->
                <path d="M90,100 Q110,150 95,220 Q120,280 100,340 L190,340 L190,400" fill="#3b82f6" opacity="0.3"/>
                <rect x="85" y="95" width="30" height="200" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="6,3"/>
                <use href="#collagen" x="100" y="200"/>
                <use href="#collagen" x="95" y="260"/>
                <use href="#collagen" x="105" y="310"/>
                
                <text x="100" y="470" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Vessel wall damage exposes</text>
                <text x="100" y="485" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">subendothelial collagen</text>
            </g>

            <!-- Stage 2 -->
            <g class="stage-group" transform="translate(270, 0)">
                <rect class="stage-bg" x="0" y="0" width="200" height="500" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
                <text x="100" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">2. Platelet Adhesion</text>
                
                <rect x="10" y="60" width="180" height="380" rx="8" fill="url(#lumenGrad)" stroke="url(#vesselGrad)" stroke-width="4"/>
                <path d="M10,100 L190,100 M10,400 L190,400" stroke="url(#vesselGrad)" stroke-width="3" stroke-dasharray="8,4"/>
                
                <use href="#collagen" x="100" y="200"/>
                <use href="#collagen" x="95" y="260"/>
                <use href="#collagen" x="105" y="310"/>
                
                <!-- Adhered Platelets -->
                <g class="platelet" transform="translate(95, 195)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(108, 255)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(98, 305)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(115, 210)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(85, 280)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(105, 335)"><use href="#platelet"/></g>
                
                <!-- von Willebrand Factor lines -->
                <path d="M95,195 Q85,170 70,180" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,2"/>
                <path d="M108,255 Q120,230 140,240" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,2"/>
                
                <text x="100" y="470" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Platelets bind to collagen via</text>
                <text x="100" y="485" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">vWF &amp; GPIb receptors</text>
            </g>

            <!-- Stage 3 -->
            <g class="stage-group" transform="translate(490, 0)">
                <rect class="stage-bg" x="0" y="0" width="200" height="500" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
                <text x="100" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">3. Platelet Aggregation</text>
                
                <rect x="10" y="60" width="180" height="380" rx="8" fill="url(#lumenGrad)" stroke="url(#vesselGrad)" stroke-width="4"/>
                <path d="M10,100 L190,100 M10,400 L190,400" stroke="url(#vesselGrad)" stroke-width="3" stroke-dasharray="8,4"/>
                
                <!-- Primary Plug -->
                <circle cx="100" cy="240" r="55" fill="#fef08a" opacity="0.4" stroke="#eab308" stroke-width="2"/>
                
                <g class="platelet" transform="translate(85, 200)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(115, 205)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(90, 230)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(110, 235)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(100, 265)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(80, 270)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(125, 250)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(95, 285)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(105, 295)"><use href="#platelet"/></g>
                
                <!-- Activation signals -->
                <circle cx="100" cy="240" r="3" fill="#f59e0b" class="flow-arrow"/>
                <circle cx="100" cy="240" r="6" fill="none" stroke="#f59e0b" stroke-width="1" class="flow-arrow"/>
                
                <text x="100" y="470" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Activated platelets release ADP &amp; TXA2,</text>
                <text x="100" y="485" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">recruiting more platelets (primary plug)</text>
            </g>

            <!-- Stage 4 -->
            <g class="stage-group" transform="translate(710, 0)">
                <rect class="stage-bg" x="0" y="0" width="200" height="500" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
                <text x="100" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">4. Coagulation Cascade</text>
                
                <rect x="10" y="60" width="180" height="380" rx="8" fill="url(#lumenGrad)" stroke="url(#vesselGrad)" stroke-width="4"/>
                <path d="M10,100 L190,100 M10,400 L190,400" stroke="url(#vesselGrad)" stroke-width="3" stroke-dasharray="8,4"/>
                
                <g class="platelet" transform="translate(85, 200)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(115, 205)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(90, 230)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(110, 235)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(100, 265)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(80, 270)"><use href="#platelet"/></g>
                <g class="platelet" transform="translate(125, 250)"><use href="#platelet"/></g>
                
                <!-- Fibrin Mesh -->
                <use href="#fibrin" x="60" y="180"/>
                <use href="#fibrin" x="110" y="190"/>
                <use href="#fibrin" x="70" y="220"/>
                <use href="#fibrin" x="120" y="230"/>
                <use href="#fibrin" x="85" y="260"/>
                <use href="#fibrin" x="105" y="270"/>
                <use href="#fibrin" x="65" y="290"/>
                <use href="#fibrin" x="130" y="280"/>
                <use href="#fibrin" x="90" y="310"/>
                
                <!-- Trapped RBCs -->
                <g class="platelet" transform="translate(95, 245)"><use href="#rbc"/></g>
                <g class="platelet" transform="translate(110, 255)"><use href="#rbc"/></g>
                <g class="platelet" transform="translate(88, 285)"><use href="#rbc"/></g>
                <g class="platelet" transform="translate(120, 290)"><use href="#rbc"/></g>
                
                <text x="100" y="470" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Thrombin converts fibrinogen to</text>
                <text x="100" y="485" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">fibrin, trapping RBCs &amp; platelets</text>
            </g>

            <!-- Stage 5 -->
            <g class="stage-group" transform="translate(930, 0)">
                <rect class="stage-bg" x="0" y="0" width="200" height="500" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
                <text x="100" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">5. Mature Thrombus</text>
                
                <rect x="10" y="60" width="180" height="380" rx="8" fill="url(#lumenGrad)" stroke="url(#vesselGrad)" stroke-width="4"/>
                <path d="M10,100 L190,100 M10,400 L190,400" stroke="url(#vesselGrad)" stroke-width="3" stroke-dasharray="8,4"/>
                
                <!-- Dense Thrombus -->
                <path d="M20,120 Q100,100 180,130 Q170,200 180,280 Q160,350 180,390 L180,420 L20,420 L20,380 Q40,300 20,220 Q30,160 20,120 Z" fill="#7f1d1d" opacity="0.85"/>
                <path d="M30,140 Q100,125 170,150 Q160,210 170,270 Q150,330 170,370" fill="none" stroke="#b91c1c" stroke-width="2"/>
                
                <!-- Fibrin reinforcement -->
                <use href="#fibrin" x="40" y="160"/>
                <use href="#fibrin" x="130" y="180"/>
                <use href="#fibrin" x="60" y="240"/>
                <use href="#fibrin" x="110" y="260"/>
                <use href="#fibrin" x="50" y="320"/>
                <use href="#fibrin" x="140" y="300"/>
                
                <!-- Trapped cells -->
                <use href="#rbc" x="70" y="190"/>
                <use href="#rbc" x="100" y="220"/>
                <use href="#rbc" x="80" y="290"/>
                <use href="#rbc" x="120" y="310"/>
                <use href="#rbc" x="90" y="350"/>
                <use href="#platelet" x="110" y="170"/>
                <use href="#platelet" x="85" y="250"/>
                <use href="#platelet" x="130" y="280"/>
                
                <!-- Flow blockage -->
                <path d="M20,120 L20,80 L180,80 L180,130" fill="#0f172a" opacity="0.4"/>
                <text x="100" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f87171" text-anchor="middle">⚠ LUMEN OCCLUDED</text>
                
                <text x="100" y="470" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Thrombus stabilizes &amp; grows,</text>
                <text x="100" y="485" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">restricting or blocking blood flow</text>
            </g>

            <!-- Connecting Arrows -->
            <g class="flow-arrow" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M250,250 L270,250 L265,245 M270,250 L265,255"/>
                <path d="M470,250 L490,250 L485,245 M490,250 L485,255"/>
                <path d="M690,250 L710,250 L705,245 M710,250 L705,255"/>
                <path d="M910,250 L930,250 L925,245 M930,250 L925,255"/>
            </g>
            
            <!-- Title/Context -->
            <text x="600" y="530" font-family="sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle" font-style="italic">Longitudinal cross-section of a blood vessel during thrombogenesis</text>
        </svg>
    </div>
</body>
</html>

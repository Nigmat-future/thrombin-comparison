<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </radialGradient>

    <!-- Red Blood Cell Gradient -->
    <radialGradient id="rbcGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff7675"/>
      <stop offset="50%" stop-color="#d63031"/>
      <stop offset="100%" stop-color="#a01a19"/>
    </radialGradient>

    <!-- Vessel Wall Gradient -->
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fab1a0"/>
      <stop offset="100%" stop-color="#e17055"/>
    </linearGradient>

    <!-- Components -->
    <circle id="rbc" r="14" fill="url(#rbcGrad)">
      <animate attributeName="cy" values="-2;2;-2" dur="3s" repeatCount="indefinite" additive="sum"/>
    </circle>
    
    <ellipse id="platelet" rx="6" ry="4" fill="#6c5ce7">
      <animate attributeName="cy" values="-1;1;-1" dur="2.5s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
    
    <path id="active-platelet" d="M0,-10 L2,-4 L9,-2 L4,3 L5,10 L0,5 L-5,10 L-4,3 L-9,-2 L-2,-4 Z" fill="#a29bfe" stroke="#6c5ce7" stroke-width="1"/>

    <!-- Filter for Thrombus Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 34px; font-weight: 800; fill: #2d3436; }
      .subtitle { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 16px; font-weight: 500; fill: #636e72; }
      .panel-title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 22px; font-weight: 700; fill: #d63031; }
      .desc { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; fill: #2d3436; }
      .flow-arrow { stroke: #b2bec3; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 5,5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="550" fill="url(#bgGrad)"/>

  <!-- Main Title -->
  <text x="600" y="60" text-anchor="middle" class="title">The Process of Thrombosis</text>
  <text x="600" y="85" text-anchor="middle" class="subtitle">How a blood clot forms inside a blood vessel</text>

  <!-- ==================== PANEL 1: NORMAL BLOOD FLOW ==================== -->
  <g transform="translate(50, 130)">
    <!-- Vessel Walls -->
    <rect x="0" y="0" width="320" height="25" fill="url(#wallGrad)" rx="5"/>
    <rect x="0" y="160" width="320" height="25" fill="url(#wallGrad)" rx="5"/>
    
    <!-- Flow Arrows -->
    <path d="M 20 50 L 300 50 M 290 40 L 300 50 L 290 60" class="flow-arrow"/>
    <path d="M 20 130 L 300 130 M 290 120 L 300 130 L 290 140" class="flow-arrow"/>

    <!-- Red Blood Cells -->
    <use href="#rbc" x="60" y="70" />
    <use href="#rbc" x="120" y="110" />
    <use href="#rbc" x="180" y="50" />
    <use href="#rbc" x="240" y="100" />
    <use href="#rbc" x="290" y="70" />
    <use href="#rbc" x="80" y="140" />
    <use href="#rbc" x="210" y="140" />

    <!-- Inactive Platelets -->
    <use href="#platelet" x="100" y="85" />
    <use href="#platelet" x="200" y="80" />
    <use href="#platelet" x="150" y="135" />
    <use href="#platelet" x="260" y="125" />

    <!-- Text Description -->
    <text x="160" y="240" text-anchor="middle" class="panel-title">1. Normal Blood Flow</text>
    <text x="160" y="270" text-anchor="middle" class="desc">Blood flows freely through the vessel.</text>
    <text x="160" y="290" text-anchor="middle" class="desc">Platelets remain smooth and inactive,</text>
    <text x="160" y="310" text-anchor="middle" class="desc">patrolling the intact endothelium.</text>
  </g>

  <!-- ==================== PANEL 2: ENDOTHELIAL INJURY ==================== -->
  <g transform="translate(440, 130)">
    <!-- Top Vessel Wall -->
    <rect x="0" y="0" width="320" height="25" fill="url(#wallGrad)" rx="5"/>
    
    <!-- Broken Bottom Vessel Wall (Injury) -->
    <path d="M 0 160 L 120 160 L 130 175 L 150 165 L 170 180 L 190 165 L 200 160 L 320 160 L 320 185 L 0 185 Z" fill="url(#wallGrad)"/>
    
    <!-- Exposed Collagen / Plaque -->
    <path d="M 120 160 Q 130 150 140 165 T 160 160 T 180 165 T 200 160" stroke="#f1c40f" stroke-width="6" fill="none" stroke-linecap="round"/>
    
    <!-- Flow Arrows (slightly disrupted) -->
    <path d="M 20 50 L 300 50 M 290 40 L 300 50 L 290 60" class="flow-arrow"/>
    <path d="M 20 120 L 100 120 Q 150 110 200 120 L 300 120 M 290 110 L 300 120 L 290 130" class="flow-arrow"/>

    <!-- Red Blood Cells -->
    <use href="#rbc" x="50" y="60" />
    <use href="#rbc" x="110" y="90" />
    <use href="#rbc" x="170" y="60" />
    <use href="#rbc" x="240" y="80" />
    <use href="#rbc" x="290" y="110" />
    <use href="#rbc" x="80" y="130" />
    <use href="#rbc" x="220" y="140" />

    <!-- Active Platelets Aggregating -->
    <use href="#active-platelet" x="135" y="155" />
    <use href="#active-platelet" x="150" y="145" />
    <use href="#active-platelet" x="165" y="152" />
    <use href="#active-platelet" x="180" y="148" />
    <use href="#active-platelet" x="145" y="130" />
    <use href="#active-platelet" x="170" y="135" />
    <use href="#active-platelet" x="155" y="120" />

    <!-- A few inactive/transitioning platelets nearby -->
    <use href="#platelet" x="100" y="140" />
    <use href="#platelet" x="200" y="130" />

    <!-- Text Description -->
    <text x="160" y="240" text-anchor="middle" class="panel-title">2. Platelet Adhesion</text>
    <text x="160" y="270" text-anchor="middle" class="desc">Vessel wall damage exposes collagen.</text>
    <text x="160" y="290" text-anchor="middle" class="desc">Platelets quickly become activated,</text>
    <text x="160" y="310" text-anchor="middle" class="desc">change shape (spiky), and clump together.</text>
  </g>

  <!-- ==================== PANEL 3: THROMBUS FORMATION ==================== -->
  <g transform="translate(830, 130)">
    <!-- Top Vessel Wall -->
    <rect x="0" y="0" width="320" height="25" fill="url(#wallGrad)" rx="5"/>
    
    <!-- Broken Bottom Vessel Wall -->
    <path d="M 0 160 L 100 160 L 115 175 L 140 165 L 180 180 L 210 165 L 220 160 L 320 160 L 320 185 L 0 185 Z" fill="url(#wallGrad)"/>
    
    <!-- Exposed Collagen -->
    <path d="M 100 160 Q 120 150 140 165 T 180 160 T 220 160" stroke="#f1c40f" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Severely Restricted Flow Arrows -->
    <path d="M 20 45 L 300 45 M 290 35 L 300 45 L 290 55" class="flow-arrow"/>
    <path d="M 20 80 Q 150 50 300 80 M 290 70 L 300 80 L 290 90" class="flow-arrow"/>

    <!-- Free Flowing RBCs (few) -->
    <use href="#rbc" x="60" y="50" />
    <use href="#rbc" x="160" y="45" />
    <use href="#rbc" x="260" y="55" />

    <!-- THE THROMBUS (Clot) -->
    <g filter="url(#glow)">
      <!-- Fibrin Mesh Lines (Background) -->
      <path d="M 110 160 L 140 80 M 130 160 L 170 70 M 160 160 L 210 90 M 120 120 L 200 140 M 140 90 L 210 150 M 110 140 L 180 110 L 220 130 M 150 160 L 190 60 M 180 160 L 130 90" stroke="#ffeaa7" stroke-width="3" stroke-linecap="round" fill="none"/>

      <!-- Trapped Red Blood Cells -->
      <use href="#rbc" x="130" y="140" />
      <use href="#rbc" x="155" y="110" />
      <use href="#rbc" x="180" y="145" />
      <use href="#rbc" x="140" y="85" />
      <use href="#rbc" x="190" y="115" />
      <use href="#rbc" x="165" y="130" />
      <use href="#rbc" x="175" y="80" />

      <!-- Massive Platelet Aggregation -->
      <use href="#active-platelet" x="120" y="150" />
      <use href="#active-platelet" x="145" y="155" />
      <use href="#active-platelet" x="165" y="160" />
      <use href="#active-platelet" x="195" y="150" />
      <use href="#active-platelet" x="135" y="125" />
      <use href="#active-platelet" x="150" y="135" />
      <use href="#active-platelet" x="185" y="130" />
      <use href="#active-platelet" x="170" y="115" />
      <use href="#active-platelet" x="155" y="95" />
      <use href="#active-platelet" x="180" y="100" />
      <use href="#active-platelet" x="195" y="95" />
      <use href="#active-platelet" x="145" y="70" />

      <!-- Fibrin Mesh Lines (Foreground) -->
      <path d="M 125 155 L 160 85 M 145 160 L 195 75 M 115 115 L 205 135 L 145 95 M 175 160 L 135 95 M 185 145 L 205 85" stroke="#f1c40f" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Text Description -->
    <text x="160" y="240" text-anchor="middle" class="panel-title">3. Thrombus Formation</text>
    <text x="160" y="270" text-anchor="middle" class="desc">The coagulation cascade creates a</text>
    <text x="160" y="290" text-anchor="middle" class="desc">strong fibrin mesh. Red blood cells and</text>
    <text x="160" y="310" text-anchor="middle" class="desc">platelets get trapped, forming a solid clot.</text>
  </g>

  <!-- Flow Connectors between panels -->
  <path d="M 390 220 L 420 220 L 410 215 M 420 220 L 410 225" stroke="#b2bec3" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 780 220 L 810 220 L 800 215 M 810 220 L 800 225" stroke="#b2bec3" stroke-width="3" fill="none" stroke-linecap="round"/>

</svg>
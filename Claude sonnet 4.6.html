<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thrombosis – Blood Clot Formation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0f1e;
    font-family: 'Segoe UI', sans-serif;
    color: #e0e8ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 1.8em;
    color: #ff6b8a;
    margin-bottom: 4px;
    text-align: center;
    letter-spacing: 1px;
  }
  .subtitle { font-size: 0.85em; color: #7a90cc; margin-bottom: 20px; text-align:center; }

  .stage-nav {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 18px;
  }
  .stage-btn {
    padding: 7px 14px; border-radius: 20px; border: 1.5px solid #3a4a7a;
    background: #111827; color: #8899cc; cursor: pointer; font-size: 0.78em;
    transition: all 0.3s;
  }
  .stage-btn.active, .stage-btn:hover {
    background: #ff4466; border-color: #ff4466; color: #fff;
  }

  .stage-container {
    width: 100%; max-width: 820px;
    background: #0d1526;
    border: 1px solid #1e3060;
    border-radius: 16px;
    padding: 20px;
  }
  .stage-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
  }
  .stage-num {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #ff4466, #cc2244);
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 1em; flex-shrink: 0;
  }
  .stage-title { font-size: 1.15em; font-weight: 600; color: #ffccd5; }
  .stage-desc { font-size: 0.83em; color: #8898bb; margin-bottom: 14px; line-height: 1.6; }

  svg.main { width: 100%; border-radius: 10px; background: #060d1a; display: block; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px; font-size: 0.75em; color: #8899bb;
  }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink:0; }

  .info-box {
    margin-top: 14px; padding: 10px 14px;
    background: #0a1828; border-left: 3px solid #ff4466;
    border-radius: 6px; font-size: 0.8em; color: #99aacc; line-height: 1.6;
  }

  .nav-btns {
    display: flex; gap: 12px; margin-top: 18px; justify-content: center;
  }
  .nav-btn {
    padding: 9px 28px; border-radius: 24px; border: none; cursor: pointer;
    font-size: 0.88em; font-weight: 600; transition: all 0.3s;
  }
  .prev-btn { background: #1e2a44; color: #8899cc; }
  .prev-btn:hover { background: #2a3a5a; }
  .next-btn { background: linear-gradient(135deg, #ff4466, #cc2244); color: #fff; }
  .next-btn:hover { opacity: 0.85; }
  .next-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .prev-btn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<h1>🩸 Thrombosis: Blood Clot Formation</h1>
<p class="subtitle">Interactive step-by-step visualization of thrombus development</p>

<div class="stage-nav" id="stageNav"></div>

<div class="stage-container">
  <div class="stage-header">
    <div class="stage-num" id="stageNum">1</div>
    <div class="stage-title" id="stageTitle"></div>
  </div>
  <div class="stage-desc" id="stageDesc"></div>
  <svg class="main" id="mainSvg" viewBox="0 0 780 240" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="legend" id="legend"></div>
  <div class="info-box" id="infoBox"></div>
</div>

<div class="nav-btns">
  <button class="nav-btn prev-btn" id="prevBtn" onclick="changeStage(-1)">◀ Previous</button>
  <button class="nav-btn next-btn" id="nextBtn" onclick="changeStage(1)">Next ▶</button>
</div>

<script>
const stages = [
  {
    num: 1,
    title: "Normal Blood Vessel",
    desc: "A healthy blood vessel has an intact endothelial lining. Red blood cells (erythrocytes), white blood cells (leukocytes), and platelets flow freely through the lumen. The smooth endothelium produces nitric oxide (NO) and prostacyclin (PGI₂) to prevent unwanted clotting.",
    info: "⚙️ Key players: Endothelial cells maintain vascular homeostasis by releasing anti-thrombotic factors. Platelets circulate in an inactive (discoid) form.",
    legend: [
      { color: "#cc2233", label: "Red Blood Cells (Erythrocytes)" },
      { color: "#ffe066", label: "Platelets (inactive)" },
      { color: "#66aaff", label: "Endothelial Lining" },
    ],
    render: renderStage1
  },
  {
    num: 2,
    title: "Vascular Injury & Endothelial Damage",
    desc: "Mechanical trauma, atherosclerosis, or inflammation disrupts the endothelium. Sub-endothelial collagen and von Willebrand factor (vWF) are exposed to the bloodstream. The vessel attempts vasoconstriction to reduce blood loss.",
    info: "⚡ Trigger: Exposed collagen and vWF act as powerful activators of the primary hemostasis cascade. Tissue factor (TF) is also released.",
    legend: [
      { color: "#ff8833", label: "Exposed Collagen / Sub-endothelium" },
      { color: "#cc2233", label: "Red Blood Cells" },
      { color: "#ff4444", label: "Injury Site" },
    ],
    render: renderStage2
  },
  {
    num: 3,
    title: "Platelet Adhesion & Activation",
    desc: "Circulating platelets rapidly adhere to exposed collagen via glycoprotein Ib (GPIb) receptors binding to vWF. This triggers platelet activation: platelets change shape from disc to spiny sphere, and release granule contents (ADP, thromboxane A₂, serotonin).",
    info: "🔬 Shape change: Activated platelets become irregular with pseudopods, dramatically increasing their surface area for aggregation. ADP and TXA₂ recruit more platelets.",
    legend: [
      { color: "#ffaa00", label: "Activated Platelets (spiny)" },
      { color: "#ffe066", label: "Inactive Platelets" },
      { color: "#ff8833", label: "Collagen Fibers" },
    ],
    render: renderStage3
  },
  {
    num: 4,
    title: "Platelet Aggregation & Coagulation Cascade",
    desc: "GPIIb/IIIa receptors on activated platelets bind fibrinogen, linking platelets together. Simultaneously, the coagulation cascade is triggered via the extrinsic (tissue factor) and intrinsic pathways, generating thrombin which converts fibrinogen → fibrin.",
    info: "🧬 Coagulation cascade: Thrombin (factor IIa) is the central enzyme. It cleaves fibrinogen into fibrin monomers that polymerize into a mesh, reinforcing the platelet plug.",
    legend: [
      { color: "#ffaa00", label: "Platelet Aggregate" },
      { color: "#ffeeaa", label: "Fibrin Strands" },
      { color: "#ff6688", label: "Thrombin Activity" },
    ],
    render: renderStage4
  },
  {
    num: 5,
    title: "Stable Thrombus Formation",
    desc: "The platelet plug is reinforced by a dense fibrin mesh (cross-linked by factor XIIIa). Red blood cells become trapped within the mesh. The resulting thrombus may partially or fully occlude the vessel lumen, reducing or stopping blood flow.",
    info: "⚠️ Clinical Impact: A thrombus can cause deep vein thrombosis (DVT), pulmonary embolism (if it breaks off), myocardial infarction, or stroke depending on its location. Treatment: anticoagulants, antiplatelets, thrombolytics.",
    legend: [
      { color: "#cc4400", label: "Fibrin Mesh (cross-linked)" },
      { color: "#cc2233", label: "Trapped Red Blood Cells" },
      { color: "#ffaa00", label: "Platelet Core" },
    ],
    render: renderStage5
  }
];

let currentStage = 0;

function renderStage1(svg) {
  // Vessel walls
  svg.innerHTML = `
    <defs>
      <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a3a6a"/>
        <stop offset="100%" stop-color="#0d2040"/>
      </linearGradient>
      <linearGradient id="lumenGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a0810"/>
        <stop offset="100%" stop-color="#0e0610"/>
      </linearGradient>
    </defs>
    <!-- Vessel walls -->
    <rect x="0" y="0" width="780" height="55" fill="url(#wallGrad)" rx="0"/>
    <rect x="0" y="185" width="780" height="55" fill="url(#wallGrad)" rx="0"/>
    <!-- Lumen -->
    <rect x="0" y="55" width="780" height="130" fill="url(#lumenGrad)"/>
    <!-- Endothelium top -->
    <rect x="0" y="50" width="780" height="10" fill="#2255aa" opacity="0.7" rx="2"/>
    <!-- Endothelium bottom -->
    <rect x="0" y="180" width="780" height="10" fill="#2255aa" opacity="0.7" rx="2"/>
    <!-- Endothelium label -->
    <text x="10" y="46" fill="#5588ff" font-size="11" font-family="Segoe UI">Endothelium</text>
    <text x="10" y="196" fill="#5588ff" font-size="11" font-family="Segoe UI">Endothelium</text>

    <!-- Flow arrow -->
    <text x="340" y="30" fill="#3355aa" font-size="13" font-family="Segoe UI" text-anchor="middle">▶ Blood Flow ▶</text>

    <!-- Red blood cells - animated -->
    ${makeRBCs()}
    <!-- Platelets inactive -->
    ${makePlatelets()}

    <!-- NO label -->
    <text x="680" y="75" fill="#44ffaa" font-size="10" font-family="Segoe UI" opacity="0.7">NO · PGI₂</text>
    <text x="665" y="86" fill="#44ffaa" font-size="9" font-family="Segoe UI" opacity="0.6">(anti-thrombotic)</text>
  `;
}

function makeRBCs() {
  const positions = [60,150,250,350,440,540,630,720];
  const ys = [90,130,105,150,85,125,145,100];
  return positions.map((x,i) => `
    <ellipse cx="${x}" cy="${ys[i]}" rx="22" ry="13" fill="#cc2233" opacity="0.85">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="780,0"
        dur="${2.5 + i*0.3}s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
    <ellipse cx="${x}" cy="${ys[i]}" rx="8" ry="4" fill="#991122" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="780,0"
        dur="${2.5 + i*0.3}s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
  `).join('');
}

function makePlatelets() {
  const positions = [110,220,320,420,510,600,690];
  const ys = [115,155,95,140,110,155,120];
  return positions.map((x,i) => `
    <ellipse cx="${x}" cy="${ys[i]}" rx="7" ry="4" fill="#ffe066" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="780,0"
        dur="${3 + i*0.25}s" repeatCount="indefinite" additive="sum"/>
    </ellipse>
  `).join('');
}

function renderStage2(svg) {
  svg.innerHTML = `
    <defs>
      <linearGradient id="wallGrad2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a3a6a"/>
        <stop offset="100%" stop-color="#0d2040"/>
      </linearGradient>
    </defs>
    <!-- Vessel walls -->
    <rect x="0" y="0" width="780" height="55" fill="url(#wallGrad2)"/>
    <rect x="0" y="185" width="780" height="55" fill="url(#wallGrad2)"/>
    <rect x="0" y="55" width="780" height="130" fill="#0e0610"/>

    <!-- Endothelium top - broken in middle -->
    <rect x="0" y="50" width="310" height="10" fill="#2255aa" opacity="0.7"/>
    <rect x="470" y="50" width="310" height="10" fill="#2255aa" opacity="0.7"/>
    <!-- Endothelium bottom -->
    <rect x="0" y="180" width="310" height="10" fill="#2255aa" opacity="0.7"/>
    <rect x="470" y="180" width="310" height="10" fill="#2255aa" opacity="0.7"/>

    <!-- Injury gap top -->
    <polygon points="310,50 390,58 470,50 470,60 390,68 310,60" fill="#ff3322" opacity="0.6"/>
    <!-- Injury gap bottom -->
    <polygon points="310,190 390,182 470,190 470,180 390,172 310,180" fill="#ff3322" opacity="0.6"/>

    <!-- Exposed collagen fibers -->
    ${makeCollagen(390, 60, 80, 'top')}
    ${makeCollagen(390, 175, 80, 'bottom')}

    <!-- vWF label -->
    <text x="355" y="100" fill="#ff8833" font-size="10" font-family="Segoe UI" text-anchor="middle">vWF</text>
    <text x="355" y="160" fill="#ff8833" font-size="10" font-family="Segoe UI" text-anchor="middle">vWF</text>

    <!-- Injury labels -->
    <text x="390" y="30" fill="#ff4444" font-size="12" font-family="Segoe UI" text-anchor="middle" font-weight="bold">⚡ INJURY SITE</text>

    <!-- Vasoconstriction arrows -->
    <text x="200" y="120" fill="#ffaa44" font-size="10" font-family="Segoe UI" opacity="0.7">◀ vasoconstriction ▶</text>
    <text x="560" y="120" fill="#ffaa44" font-size="10" font-family="Segoe UI" opacity="0.7">◀ vasoconstriction ▶</text>

    <!-- Tissue Factor -->
    <text x="390" y="130" fill="#ff6688" font-size="11" font-family="Segoe UI" text-anchor="middle">Tissue Factor (TF) released</text>

    <!-- Some scattered RBCs -->
    <ellipse cx="120" cy="100" rx="22" ry="13" fill="#cc2233" opacity="0.8"/>
    <ellipse cx="600" cy="130" rx="22" ry="13" fill="#cc2233" opacity="0.8"/>
    <ellipse cx="220" cy="150" rx="22" ry="13" fill="#cc2233" opacity="0.8"/>
    <ellipse cx="680" cy="95" rx="22" ry="13" fill="#cc2233" opacity="0.8"/>

    <!-- Pulse animation on injury -->
    <circle cx="390" cy="120" r="30" fill="none" stroke="#ff4444" stroke-width="2" opacity="0.6">
      <animate attributeName="r" from="20" to="60" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.8" to="0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  `;
}

function makeCollagen(cx, cy, width, dir) {
  const lines = [];
  const ys = dir === 'top' ? [8,14,20,26,32] : [-8,-14,-20,-26,-32];
  for(let i = 0; i < 7; i++) {
    const x = cx - width/2 + i*(width/6);
    ys.forEach(dy => {
      lines.push(`<line x1="${x}" y1="${cy}" x2="${x+8}" y2="${cy+dy}" stroke="#ff8833" stroke-width="1.5" opacity="0.7"/>`);
    });
  }
  return lines.join('');
}

function renderStage3(svg) {
  svg.innerHTML = `
    <defs>
      <linearGradient id="wg3" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a3a6a"/>
        <stop offset="100%" stop-color="#0d2040"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="780" height="55" fill="url(#wg3)"/>
    <rect x="0" y="185" width="780" height="55" fill="url(#wg3)"/>
    <rect x="0" y="55" width="780" height="130" fill="#0e0610"/>

    <!-- Endothelium (broken) -->
    <rect x="0" y="50" width="280" height="8" fill="#2255aa" opacity="0.6"/>
    <rect x="500" y="50" width="280" height="8" fill="#2255aa" opacity="0.6"/>
    <rect x="0" y="182" width="280" height="8" fill="#2255aa" opacity="0.6"/>
    <rect x="500" y="182" width="280" height="8" fill="#2255aa" opacity="0.6"/>

    <!-- Collagen exposed -->
    ${makeCollagen(390, 58, 100, 'top')}
    ${makeCollagen(390, 182, 100, 'bottom')}

    <!-- Inactive platelets flowing in -->
    <ellipse cx="100" cy="115" rx="7" ry="4" fill="#ffe066" opacity="0.9"/>
    <ellipse cx="160" cy="155" rx="7" ry="4" fill="#ffe066" opacity="0.9"/>
    <ellipse cx="600" cy="110" rx="7" ry="4" fill="#ffe066" opacity="0.9"/>
    <ellipse cx="660" cy="150" rx="7" ry="4" fill="#ffe066" opacity="0.9"/>

    <!-- Activated platelets on top wall -->
    ${makeActivatedPlatelet(340, 78, 1)}
    ${makeActivatedPlatelet(370, 75, 1)}
    ${makeActivatedPlatelet(400, 80, 1)}
    ${makeActivatedPlatelet(430, 76, 1)}
    ${makeActivatedPlatelet(355, 90, 1)}
    ${makeActivatedPlatelet(415, 88, 1)}

    <!-- Activated platelets on bottom wall -->
    ${makeActivatedPlatelet(345, 168, -1)}
    ${makeActivatedPlatelet(375, 165, -1)}
    ${makeActivatedPlatelet(405, 170, -1)}
    ${makeActivatedPlatelet(435, 166, -1)}

    <!-- GPIb / vWF binding labels -->
    <text x="390" y="115" fill="#ffbb44" font-size="10" font-family="Segoe UI" text-anchor="middle">GPIb ↔ vWF binding</text>
    <text x="390" y="145" fill="#ffbb44" font-size="10" font-family="Segoe UI" text-anchor="middle">ADP · TXA₂ · Serotonin released</text>

    <!-- RBCs -->
    <ellipse cx="90" cy="130" rx="22" ry="13" fill="#cc2233" opacity="0.7"/>
    <ellipse cx="570" cy="125" rx="22" ry="13" fill="#cc2233" opacity="0.7"/>
    <ellipse cx="680" cy="130" rx="22" ry="13" fill="#cc2233" opacity="0.7"/>

    <text x="390" y="30" fill="#ffaa44" font-size="12" font-family="Segoe UI" text-anchor="middle">Platelet Adhesion &amp; Activation</text>
  `;
}

function makeActivatedPlatelet(cx, cy, dir) {
  const spikes = 8;
  const r1 = 10, r2 = 16;
  let points = '';
  for(let i = 0; i < spikes*2; i++) {
    const angle = (i * Math.PI) / spikes;
    const r = i % 2 === 0 ? r1 : r2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle) * 0.6;
    points += `${x},${y} `;
  }
  return `<polygon points="${points}" fill="#ffaa00" opacity="0.9" stroke="#ffdd44" stroke-width="0.5"/>
          <circle cx="${cx}" cy="${cy}" r="4" fill="#ffdd88" opacity="0.8"/>`;
}

function renderStage4(svg) {
  svg.innerHTML = `
    <defs>
      <linearGradient id="wg4" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a3a6a"/>
        <stop offset="100%" stop-color="#0d2040"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="780" height="55" fill="url(#wg4)"/>
    <rect x="0" y="185" width="780" height="55" fill="url(#wg4)"/>
    <rect x="0" y="55" width="780" height="130" fill="#0e0610"/>

    <!-- Endothelium (broken) -->
    <rect x="0" y="50" width="250" height="8" fill="#2255aa" opacity="0.5"/>
    <rect x="530" y="50" width="250" height="8" fill="#2255aa" opacity="0.5"/>
    <rect x="0" y="182" width="250" height="8" fill="#2255aa" opacity="0.5"/>
    <rect x="530" y="182" width="250" height="8" fill="#2255aa" opacity="0.5"/>

    <!-- Platelet aggregate (growing mass) -->
    ${makePlateletMass(390, 120, 110, 70)}

    <!-- Fibrin strands -->
    ${makeFibrinStrands()}

    <!-- Coagulation cascade diagram -->
    <text x="140" y="90" fill="#ff6688" font-size="9" font-family="Segoe UI" text-anchor="middle">TF + VIIa</text>
    <text x="140" y="101" fill="#aaaaaa" font-size="8" font-family="Segoe UI" text-anchor="middle">↓</text>
    <text x="140" y="112" fill="#ff8899" font-size="9" font-family="Segoe UI" text-anchor="middle">Xa + Va</text>
    <text x="140" y="123" fill="#aaaaaa" font-size="8" font-family="Segoe UI" text-anchor="middle">↓</text>
    <text x="140" y="134" fill="#ffaacc" font-size="9" font-family="Segoe UI" text-anchor="middle">Thrombin (IIa)</text>
    <text x="140" y="145" fill="#aaaaaa" font-size="8" font-family="Segoe UI" text-anchor="middle">↓</text>
    <text x="140" y="156" fill="#ffe0aa" font-size="9" font-family="Segoe UI" text-anchor="middle">Fibrin Polymer</text>

    <!-- GPIIb/IIIa label -->
    <text x="630" y="95" fill="#aaddff" font-size="9" font-family="Segoe UI" text-anchor="middle">GPIIb/IIIa</text>
    <text x="630" y="106" fill="#aaddff" font-size="9" font-family="Segoe UI" text-anchor="middle">binds fibrinogen</text>
    <text x="630" y="120" fill="#888888" font-size="8" font-family="Segoe UI" text-anchor="middle">bridges platelets</text>

    <text x="390" y="30" fill="#ff8877" font-size="12" font-family="Segoe UI" text-anchor="middle">Aggregation + Coagulation Cascade</text>

    <!-- RBCs being pushed aside -->
    <ellipse cx="80" cy="120" rx="22" ry="13" fill="#cc2233" opacity="0.6"/>
    <ellipse cx="700" cy="115" rx="22" ry="13" fill="#cc2233" opacity="0.6"/>
  `;
}

function makePlateletMass(cx, cy, rx, ry) {
  let out = `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="#cc7700" opacity="0.4"/>`;
  // Many activated platelets packed together
  const positions = [
    [390,95],[365,105],[415,108],[340,115],[440,112],[360,125],[420,118],[380,135],[405,132],[350,132],
    [430,135],[390,150],[365,145],[415,148],[340,155],[440,145]
  ];
  positions.forEach(([x,y]) => {
    out += makeActivatedPlatelet(x, y, 0);
  });
  return out;
}

function makeFibrinStrands() {
  const strands = [
    [[280,80],[320,95],[350,110],[390,95],[430,110],[460,95],[500,80]],
    [[280,160],[310,148],[345,160],[380,148],[415,158],[450,148],[500,160]],
    [[330,80],[340,100],[345,120],[350,140],[345,160]],
    [[450,80],[445,100],[445,120],[450,140],[455,160]],
    [[280,120],[320,115],[360,120],[390,115],[420,120],[460,115],[500,120]],
  ];
  return strands.map(pts => {
    const d = pts.map((p,i) => `${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ');
    return `<path d="${d}" fill="none" stroke="#ffeeaa" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,2"/>`;
  }).join('');
}

function renderStage5(svg) {
  svg.innerHTML = `
    <defs>
      <linearGradient id="wg5" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a3a6a"/>
        <stop offset="100%" stop-color="#0d2040"/>
      </linearGradient>
      <radialGradient id="thrombGrad" cx="50%" cy="50%">
        <stop offset="0%" stop-color="#cc5500"/>
        <stop offset="100%" stop-color="#661100"/>
      </radialGradient>
    </defs>
    <rect x="0" y="0" width="780" height="55" fill="url(#wg5)"/>
    <rect x="0" y="185" width="780" height="55" fill="url(#wg5)"/>
    <rect x="0" y="55" width="780" height="130" fill="#0e0610"/>

    <!-- Broken endothelium -->
    <rect x="0" y="50" width="230" height="8" fill="#2255aa" opacity="0.4"/>
    <rect x="550" y="50" width="230" height="8" fill="#2255aa" opacity="0.4"/>
    <rect x="0" y="182" width="230" height="8" fill="#2255aa" opacity="0.4"/>
    <rect x="550" y="182" width="230" height="8" fill="#2255aa" opacity="0.4"/>

    <!-- Large thrombus body -->
    <ellipse cx="390" cy="120" rx="155" ry="85" fill="url(#thrombGrad)" opacity="0.7"/>

    <!-- Dense fibrin mesh -->
    ${makeDenseFibrin()}

    <!-- Trapped RBCs in mesh -->
    ${makeTrappedRBCs()}

    <!-- Platelet core -->
    ${makePlateletCore()}

    <!-- Vessel lumen narrowing arrows -->
    <path d="M 240 120 L 230 120" stroke="#44aaff" stroke-width="2" marker-end="url(#arr)"/>
    <path d="M 545 120 L 555 120" stroke="#44aaff" stroke-width="2"/>
    <text x="120" y="124" fill="#44aaff" font-size="10" font-family="Segoe UI" text-anchor="middle">Reduced flow ▶</text>
    <text x="665" y="124" fill="#44aaff" font-size="10" font-family="Segoe UI" text-anchor="middle">◀ Reduced flow</text>

    <!-- Warning label -->
    <text x="390" y="30" fill="#ff4444" font-size="13" font-family="Segoe UI" text-anchor="middle" font-weight="bold">⚠ STABLE THROMBUS – OCCLUSION RISK</text>

    <!-- Factor XIIIa label -->
    <text x="390" y="210" fill="#ffbb44" font-size="10" font-family="Segoe UI" text-anchor="middle">Factor XIIIa cross-links fibrin → stable clot</text>

    <!-- Pulsing danger ring -->
    <circle cx="390" cy="120" r="85" fill="none" stroke="#ff3322" stroke-width="2" opacity="0.4">
      <animate attributeName="r" from="80" to="100" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.6" to="0" dur="2s" repeatCount="indefinite"/>
    </circle>
  `;
}

function makeDenseFibrin() {
  const lines = [];
  for(let i = 0; i < 18; i++) {
    const x1 = 250 + Math.random()*280;
    const y1 = 65 + Math.random()*110;
    const x2 = 250 + Math.random()*280;
    const y2 = 65 + Math.random()*110;
    lines.push(`<line x1="${x1.toFixed(0)}" y1="${y1.toFixed(0)}" x2="${x2.toFixed(0)}" y2="${y2.toFixed(0)}"
      stroke="#ffddaa" stroke-width="1.2" opacity="0.55"/>`);
  }
  // Use seeded positions for consistency
  const fixedLines = [
    [255,75,530,75],[255,100,530,100],[255,125,530,125],[255,150,530,150],[255,170,530,170],
    [280,65,280,180],[320,65,320,180],[360,65,360,180],[400,65,400,180],[440,65,440,180],[480,65,480,180],[520,65,520,175],
    [255,90,400,65],[400,65,530,90],[255,145,390,180],[390,180,530,145],
    [280,65,530,180],[255,180,520,65]
  ];
  return fixedLines.map(([x1,y1,x2,y2]) =>
    `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#ffddaa" stroke-width="1.2" opacity="0.45"/>`
  ).join('');
}

function makeTrappedRBCs() {
  const cells = [
    [295,95],[330,115],[300,148],[350,165],[380,80],[415,80],[450,90],
    [490,110],[510,145],[480,165],[440,155],[380,155],[350,135],[410,130]
  ];
  return cells.map(([x,y]) =>
    `<ellipse cx="${x}" cy="${y}" rx="14" ry="8" fill="#cc2233" opacity="0.75"/>
     <ellipse cx="${x}" cy="${y}" rx="5" ry="3" fill="#991122" opacity="0.5"/>`
  ).join('');
}

function makePlateletCore() {
  const positions = [[385,110],[410,108],[365,120],[395,125],[420,118],[375,130],[405,135]];
  return positions.map(([x,y]) => makeActivatedPlatelet(x, y, 0)).join('');
}

function buildStageNav() {
  const nav = document.getElementById('stageNav');
  nav.innerHTML = stages.map((s,i) =>
    `<button class="stage-btn${i===0?' active':''}" onclick="goStage(${i})">Stage ${s.num}</button>`
  ).join('');
}

function goStage(i) {
  currentStage = i;
  renderCurrentStage();
}

function changeStage(delta) {
  currentStage = Math.max(0, Math.min(stages.length-1, currentStage+delta));
  renderCurrentStage();
}

function renderCurrentStage() {
  const s = stages[currentStage];
  document.getElementById('stageNum').textContent = s.num;
  document.getElementById('stageTitle').textContent = s.title;
  document.getElementById('stageDesc').textContent = s.desc;
  document.getElementById('infoBox').textContent = s.info;

  const svg = document.getElementById('mainSvg');
  s.render(svg);

  const legend = document.getElementById('legend');
  legend.innerHTML = s.legend.map(l =>
    `<div class="legend-item"><div class="legend-dot" style="background:${l.color}"></div>${l.label}</div>`
  ).join('');

  document.querySelectorAll('.stage-btn').forEach((b,i) => {
    b.classList.toggle('active', i === currentStage);
  });
  document.getElementById('prevBtn').disabled = currentStage === 0;
  document.getElementById('nextBtn').disabled = currentStage === stages.length-1;
}

buildStageNav();
renderCurrentStage();
</script>
</body>
</html>
